<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snipes dashboard</title>
  <style>
    :root {
      --bg: #1a1b26;
      --panel: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --muted: #565f89;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      background: var(--panel);
      border-bottom: 1px solid #3b4261;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
    }
    h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-width: 220px;
      max-width: 420px;
    }
    .controls label {
      font-size: 0.85rem;
      color: var(--muted);
    }
    #rangeLabel {
      color: var(--text);
      font-weight: 500;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .frame-wrap {
      flex: 1;
      position: relative;
      min-height: 400px;
    }
    iframe#dash {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 88px);
      border: 0;
      display: block;
      background: #fff;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: rgba(26, 27, 38, 0.72);
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .loading-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #3b4261;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Snipes by hostname</h1>
      <div class="controls">
        <label for="daysSlider">Time range: <span id="rangeLabel">Last 24 hours (1 day)</span></label>
        <input type="range" id="daysSlider" min="1" max="30" value="1" />
      </div>
    </header>
    <div class="frame-wrap">
      <div id="loading" class="loading-overlay show" aria-live="polite" aria-busy="true">
        <div class="spinner" role="presentation"></div>
        <div class="loading-text">Loading Discord data…</div>
      </div>
      <iframe id="dash" title="Snipes charts" sandbox="allow-scripts allow-same-origin allow-downloads"></iframe>
    </div>
  </div>
  <script>
    (function () {
      var slider = document.getElementById('daysSlider');
      var label = document.getElementById('rangeLabel');
      var dash = document.getElementById('dash');
      var loading = document.getElementById('loading');

      function fnBase() {
        return '/.netlify/functions/snipes-html';
      }

      function describeDays(n) {
        var d = parseInt(n, 10) || 1;
        if (d === 1) return 'Last 24 hours (1 day)';
        return 'Last ' + d + ' days';
      }

      function setLoading(on) {
        loading.classList.toggle('show', on);
        loading.setAttribute('aria-busy', on ? 'true' : 'false');
      }

      var debounceId = null;
      function loadDays(days, immediate) {
        var d = Math.min(30, Math.max(1, parseInt(days, 10) || 1));
        function run() {
          setLoading(true);
          var url = fnBase() + '?days=' + encodeURIComponent(String(d)) + '&_=' + Date.now();
          dash.onload = function () {
            setLoading(false);
          };
          dash.onerror = function () {
            setLoading(false);
          };
          dash.src = url;
        }
        if (immediate) {
          if (debounceId) clearTimeout(debounceId);
          run();
        } else {
          if (debounceId) clearTimeout(debounceId);
          debounceId = setTimeout(run, 450);
        }
      }

      slider.addEventListener('input', function () {
        label.textContent = describeDays(slider.value);
        loadDays(slider.value, false);
      });

      label.textContent = describeDays(slider.value);
      loadDays(slider.value, true);
    })();
  </script>
</body>
</html>
