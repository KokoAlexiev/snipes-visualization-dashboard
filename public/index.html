<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snipes dashboard</title>
  <style>
    :root {
      --bg: #1a1b26;
      --panel: #24283b;
      --text: #c0caf5;
      --accent: #7aa2f7;
      --muted: #565f89;
      --danger: #f7768e;
      --border: #3b4261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 0.75rem 1.25rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
    }
    h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.5rem 1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .field label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="date"] {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="date"]:hover,
    input[type="date"]:focus {
      border-color: var(--accent);
    }
    /* Chrome date-picker colorscheme */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    button.load-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      padding: 0.42rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.15s;
    }
    button.load-btn:hover { opacity: 0.85; }
    .cache-badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.45rem;
      border-radius: 3px;
      font-weight: 600;
      align-self: flex-end;
      margin-bottom: 0.45rem;
      display: none;
    }
    .cache-badge.hit  { background: #9ece6a22; color: #9ece6a; border: 1px solid #9ece6a55; display: inline-block; }
    .cache-badge.miss { background: #f7768e22; color: #f7768e; border: 1px solid #f7768e55; display: inline-block; }
    .error-msg {
      font-size: 0.82rem;
      color: var(--danger);
      align-self: flex-end;
      margin-bottom: 0.4rem;
    }
    .frame-wrap {
      flex: 1;
      position: relative;
      min-height: 400px;
    }
    iframe#dash {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 72px);
      border: 0;
      display: block;
      background: #fff;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: rgba(26, 27, 38, 0.72);
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .loading-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #3b4261;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .loading-range {
      font-size: 0.8rem;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Snipes by hostname</h1>
      <div class="controls">
        <div class="field">
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" />
        </div>
        <div class="field">
          <label for="endDate">End date</label>
          <input type="date" id="endDate" />
        </div>
        <button class="load-btn" id="loadBtn">Load</button>
        <span class="cache-badge" id="cacheBadge"></span>
        <span class="error-msg" id="errorMsg"></span>
      </div>
    </header>
    <div class="frame-wrap">
      <div id="loading" class="loading-overlay show" aria-live="polite" aria-busy="true">
        <div class="spinner" role="presentation"></div>
        <div class="loading-text">Loading Discord data…</div>
        <div class="loading-range" id="loadingRange"></div>
      </div>
      <iframe id="dash" title="Snipes charts" sandbox="allow-scripts allow-downloads"></iframe>
    </div>
  </div>
  <script>
    (function () {
      var startInput  = document.getElementById('startDate');
      var endInput    = document.getElementById('endDate');
      var loadBtn     = document.getElementById('loadBtn');
      var dash        = document.getElementById('dash');
      var loading     = document.getElementById('loading');
      var cacheBadge  = document.getElementById('cacheBadge');
      var errorMsg    = document.getElementById('errorMsg');
      var loadingRange = document.getElementById('loadingRange');

      var MAX_SPAN_DAYS = 30;

      /* Return today as a UTC YYYY-MM-DD string */
      function todayUTC() {
        return new Date().toISOString().slice(0, 10);
      }

      /* Return a UTC date string N days before a given YYYY-MM-DD */
      function offsetDate(dateStr, daysBack) {
        var d = new Date(dateStr + 'T00:00:00Z');
        d.setUTCDate(d.getUTCDate() - daysBack);
        return d.toISOString().slice(0, 10);
      }

      /* Validate inputs; return error string or null */
      function validate(start, end) {
        if (!start || !end) return 'Both dates are required';
        if (start > end)    return 'Start must be on or before end date';
        var s = new Date(start + 'T00:00:00Z');
        var e = new Date(end   + 'T00:00:00Z');
        var span = Math.round((e - s) / 86400000) + 1;
        if (span > MAX_SPAN_DAYS) return 'Range too wide — max ' + MAX_SPAN_DAYS + ' days';
        return null;
      }

      function setLoading(on, start, end) {
        loading.classList.toggle('show', on);
        loading.setAttribute('aria-busy', on ? 'true' : 'false');
        loadingRange.textContent = on && start && end ? start + ' → ' + end : '';
        if (on) {
          cacheBadge.className = 'cache-badge';
          cacheBadge.textContent = '';
        }
      }

      function showError(msg) {
        errorMsg.textContent = msg || '';
      }

      var debounceId = null;
      function doLoad() {
        if (debounceId) clearTimeout(debounceId);
        var start = startInput.value;
        var end   = endInput.value;
        var err   = validate(start, end);
        if (err) { showError(err); return; }
        showError('');
        setLoading(true, start, end);

        var url = '/.netlify/functions/snipes-html?start=' + encodeURIComponent(start) +
                  '&end=' + encodeURIComponent(end) + '&_=' + Date.now();

        // Use fetch so we can inspect X-Snipes-Cache header, then inject via srcdoc
        fetch(url)
          .then(function (res) {
            var hit = res.headers.get('X-Snipes-Cache');
            cacheBadge.className = 'cache-badge ' + (hit === 'HIT' ? 'hit' : 'miss');
            cacheBadge.textContent = hit === 'HIT' ? 'Cached' : 'Live fetch';
            return res.text();
          })
          .then(function (html) {
            dash.onload = function () { setLoading(false); };
            dash.onerror = function () { setLoading(false); };
            dash.srcdoc = html;
          })
          .catch(function (fetchErr) {
            setLoading(false);
            showError('Fetch failed: ' + (fetchErr && fetchErr.message));
          });
      }

      /* Debounce for date input changes — don't fire on every keystroke */
      function scheduleLoad() {
        if (debounceId) clearTimeout(debounceId);
        debounceId = setTimeout(doLoad, 600);
      }

      loadBtn.addEventListener('click', doLoad);
      startInput.addEventListener('change', scheduleLoad);
      endInput.addEventListener('change', scheduleLoad);

      /* Set defaults: start = yesterday UTC, end = today UTC (≈ last 24h as calendar window) */
      var today = todayUTC();
      endInput.value   = today;
      startInput.value = offsetDate(today, 1);

      /* Cap max date to today */
      startInput.max = today;
      endInput.max   = today;

      /* Initial auto-load */
      doLoad();
    })();
  </script>
</body>
</html>
